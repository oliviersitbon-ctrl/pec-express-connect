name: Build & Release (Windows installer)

# Build + publication de l'installeur. Se lance quand vous poussez un tag de
# version (ex. v1.0.31), ou manuellement via l'onglet Actions -> "Run workflow".
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Sign CLI (Azure Trusted Signing)
        run: dotnet tool install --global --prerelease sign

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # Precompile les types P/Invoke natifs en UNE DLL .NET Framework 4.x
      # (resources/native/MddNative.dll), puis la signe LABORA. But : supprimer
      # la compilation C# a l'execution (Add-Type @"..."@ => DLL temporaire a nom
      # aleatoire dans %TEMP%, signalee "Gen:Variant.Adware" par G DATA). La DLL
      # est chargee a l'execution via Add-Type -Path (voir src/main/native-dll.js).
      - name: Precompile & sign native DLL (MddNative)
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          node scripts/build-native.cjs
          if ($LASTEXITCODE -ne 0) { throw "build-native.cjs a echoue" }
          $sign = Join-Path $env:USERPROFILE ".dotnet\tools\sign.exe"
          & $sign code trusted-signing `
            -b resources/native MddNative.dll `
            -tse https://neu.codesigning.azure.net/ `
            -tsa labora-signing `
            -tscp labora-public `
            -v Information
          if ($LASTEXITCODE -ne 0) { throw "Signature de MddNative.dll a echoue" }

      - name: Build & publish installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signature de code Azure Trusted Signing (LABORA) via l'outil "sign"
          # (voir sign.js). L'outil lit ces 3 variables pour s'authentifier.
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: npx electron-builder --win nsis --x64 --publish always
