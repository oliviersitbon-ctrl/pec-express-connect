<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon devis dentaire</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif; }
    html, body { height:100vh; width:100vw; background:transparent; overflow:hidden; }
    /* Carte centrée avec ombre douce (la fenêtre elle-même est transparente). */
    .card { position:absolute; inset:12px; background:#fff; border-radius:18px;
      box-shadow:0 24px 60px rgba(15,23,42,.28), 0 4px 14px rgba(15,23,42,.12);
      display:flex; flex-direction:column; overflow:hidden; }
    /* Bandeau haut : sert aussi de zone de déplacement (drag). */
    .top { -webkit-app-region:drag; padding:22px 24px 0 24px; display:flex; align-items:center; gap:14px; }
    .icon { width:46px; height:46px; border-radius:14px; flex:none; display:flex; align-items:center;
      justify-content:center; }
    .icon svg { width:26px; height:26px; }
    .tone-blocked .icon { background:linear-gradient(135deg,#fee2e2,#fecaca); color:#dc2626; }
    .tone-error   .icon { background:linear-gradient(135deg,#fee2e2,#fecaca); color:#dc2626; }
    .tone-info    .icon { background:linear-gradient(135deg,#e0f2fe,#bae6fd); color:#0284c7; }
    h1 { font-size:17px; font-weight:700; color:#0f172a; letter-spacing:-.2px; }
    .body { -webkit-app-region:drag; padding:14px 24px 0 24px; flex:1; }
    .msg { font-size:13.5px; line-height:1.5; color:#475569; }
    .phone-box { margin-top:16px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px;
      padding:12px 16px; display:flex; align-items:center; gap:12px; }
    .phone-box .p-ico { width:34px; height:34px; border-radius:10px; flex:none; display:flex;
      align-items:center; justify-content:center; background:#ecfdf5; color:#059669; }
    .phone-box .p-ico svg { width:19px; height:19px; }
    .phone-label { font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:#94a3b8; font-weight:600; }
    .phone-num { font-size:20px; font-weight:800; color:#0f172a; letter-spacing:.5px;
      -webkit-user-select:text; user-select:text; }
    .actions { padding:16px 24px 22px 24px; display:flex; justify-content:flex-end; gap:10px;
      -webkit-app-region:no-drag; }
    button { -webkit-app-region:no-drag; cursor:pointer; border:none; border-radius:10px;
      font-size:13.5px; font-weight:600; padding:10px 20px; transition:transform .1s ease, box-shadow .15s, background .2s; }
    button:active { transform:translateY(1px); }
    .btn-primary { color:#fff; background:linear-gradient(135deg,#7c3aed 0%,#a855f7 100%);
      box-shadow:0 8px 20px rgba(124,58,237,.35); }
    .btn-primary:hover { box-shadow:0 10px 26px rgba(124,58,237,.45); }
    .btn-ghost { color:#475569; background:#f1f5f9; }
    .btn-ghost:hover { background:#e2e8f0; }
    .copied { font-size:11.5px; color:#059669; font-weight:600; opacity:0; transition:opacity .2s; align-self:center; margin-right:auto; }
    .copied.show { opacity:1; }
  </style>
</head>
<body>
  <div class="card tone-blocked" id="card">
    <div class="top">
      <div class="icon" id="icon">
        <!-- icône warning par défaut -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <h1 id="heading">Action bloquée</h1>
    </div>
    <div class="body">
      <div class="msg" id="message"></div>
      <div class="phone-box" id="phoneBox" hidden>
        <div class="p-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </div>
        <div>
          <div class="phone-label">Appelez Olivier</div>
          <div class="phone-num" id="phoneNum"></div>
        </div>
      </div>
    </div>
    <div class="actions">
      <span class="copied" id="copied">Numéro copié ✓</span>
      <button class="btn-ghost" id="btnCopy" hidden>Copier le numéro</button>
      <button class="btn-primary" id="btnOk">J'ai compris</button>
    </div>
  </div>

  <script>
    const card = document.getElementById('card');
    const heading = document.getElementById('heading');
    const message = document.getElementById('message');
    const phoneBox = document.getElementById('phoneBox');
    const phoneNum = document.getElementById('phoneNum');
    const btnOk = document.getElementById('btnOk');
    const btnCopy = document.getElementById('btnCopy');
    const copied = document.getElementById('copied');

    function close() { try { window.mdd.blockPopupClose(); } catch (e) {} }
    btnOk.addEventListener('click', close);
    // Échap ferme aussi.
    window.addEventListener('keydown', (e) => { if (e.key === 'Escape' || e.key === 'Enter') close(); });

    btnCopy.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText((phoneNum.textContent || '').replace(/\s+/g, ''));
        copied.classList.add('show');
        setTimeout(() => copied.classList.remove('show'), 1800);
      } catch (e) {}
    });

    (async () => {
      let d = {};
      try { d = (await window.mdd.blockPopupGet()) || {}; } catch (e) {}
      if (d.heading) heading.textContent = d.heading;
      if (d.message) message.textContent = d.message;
      if (d.tone) card.className = 'card tone-' + d.tone;
      if (d.phone) {
        phoneNum.textContent = d.phone;
        phoneBox.hidden = false;
        btnCopy.hidden = false;
      }
    })();
  </script>
</body>
</html>
