<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envoi en cours...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            background: transparent;
        }

        .bg-animated {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #f8f9ff, #f0f4ff, #e8f0ff, #f0f4ff, #f8f9ff);
            background-size: 200% 200%;
            animation: bgShift 15s ease infinite;
            border-radius: 12px;
            z-index: 0;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #a855f7, #ec4899, #a855f7);
            opacity: 0.15;
            filter: blur(60px);
            border-radius: 50%;
            animation: glowPulse 8s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes glowPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.15; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.22; }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .logo-container {
            width: 80px;
            height: 80px;
            border-radius: 22px;
            overflow: hidden;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(147, 51, 234, 0.3);
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        h1 {
            font-size: 17px;
            font-weight: 600;
            color: #111827;
            letter-spacing: -0.025em;
            margin-bottom: 6px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(168, 85, 247, 0.15);
            border-radius: 50%;
            border-top-color: #a855f7;
            animation: spin 1s ease-in-out infinite;
            margin: 20px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .status {
            font-size: 13px;
            color: #6b7280;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="bg-animated"></div>
    <div class="glow"></div>
    <div class="container">
        <div class="logo-container">
            <img src="../../assets/icon.png" alt="Mon devis dentaire">
        </div>
        <h1>Mon devis dentaire</h1>
        <div class="spinner"></div>
        <p class="status" id="status">Lecture du devis Logos...</p>
        <p class="patient" id="patient" style="font-size:13px;color:#374151;font-weight:600;margin-top:4px;min-height:18px;"></p>
        <p class="details" id="details" style="font-size:11px;color:#9ca3af;margin-top:2px;min-height:14px;"></p>
    </div>
    <script>
      const statusEl = document.getElementById('status');
      const patientEl = document.getElementById('patient');
      const detailsEl = document.getElementById('details');

      function resetUI() {
        statusEl.textContent = 'Lecture du devis Logos...';
        patientEl.textContent = '';
        detailsEl.textContent = '';
      }

      if (window.mdd && window.mdd.onLoaderReset) {
        window.mdd.onLoaderReset(resetUI);
      }
      if (window.mdd && window.mdd.onLoaderPatientInfo) {
        window.mdd.onLoaderPatientInfo((data) => {
          statusEl.textContent = 'Ouverture Mon devis dentaire PEC...';
          if (data && (data.nom || data.prenom)) {
            patientEl.textContent = ((data.prenom || '') + ' ' + (data.nom || '')).trim();
          }
          if (data && data.actesCount != null) {
            const n = data.actesCount;
            detailsEl.textContent = 'Devis ' + (data.devisId || '') + ' — ' + n + ' acte' + (n > 1 ? 's' : '');
          }
        });
      }
    </script>
</body>

</html>
