<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Installation PecExpress Desktop</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            background: transparent;
        }

        .bg-animated {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #f8f9ff, #f0f4ff, #e8f0ff, #f0f4ff, #f8f9ff);
            background-size: 200% 200%;
            animation: bgShift 15s ease infinite;
            border-radius: 12px;
            z-index: 0;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .drag-area {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 32px;
            -webkit-app-region: drag;
            z-index: 100;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 32px 28px 28px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Glow effect behind card */
        .glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #a855f7, #ec4899, #a855f7);
            opacity: 0.15;
            filter: blur(80px);
            border-radius: 50%;
            animation: glowPulse 8s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes glowPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.15; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.25; }
        }

        .logo-container {
            width: 80px;
            height: 80px;
            border-radius: 22px;
            overflow: hidden;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(147, 51, 234, 0.3);
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 30px rgba(147, 51, 234, 0.3); }
            50% { transform: scale(1.04); box-shadow: 0 14px 40px rgba(147, 51, 234, 0.4); }
        }

        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        h1 {
            font-size: 20px;
            font-weight: 700;
            color: #111827;
            letter-spacing: -0.025em;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 24px;
        }

        .spinner-container {
            margin: 0 auto 16px;
            width: 36px;
            height: 36px;
        }

        .spinner {
            width: 100%;
            height: 100%;
            border: 3px solid rgba(168, 85, 247, 0.15);
            border-radius: 50%;
            border-top-color: #a855f7;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .status {
            font-size: 14px;
            font-weight: 500;
            color: #1f2937;
            min-height: 24px;
            line-height: 1.5;
            max-width: 90%;
            word-wrap: break-word;
        }

        .progress-track {
            width: 80%;
            height: 4px;
            background: rgba(168, 85, 247, 0.1);
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            border-radius: 2px;
            position: absolute;
            left: -30%;
            animation: progressSlide 2s infinite ease-in-out;
        }

        @keyframes progressSlide {
            0% { left: -30%; width: 30%; }
            50% { left: 30%; width: 50%; }
            100% { left: 100%; width: 30%; }
        }

        .btn-install {
            display: none;
            background: linear-gradient(to right, #9333ea, #ec4899);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(147, 51, 234, 0.2);
            transition: all 0.2s ease;
            margin: 20px 0 0;
            font-family: inherit;
        }

        .btn-install:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 20px -3px rgba(147, 51, 234, 0.3);
        }

        .btn-install:active { transform: translateY(0); }

        .btn-logs {
            background: none;
            color: #9ca3af;
            border: none;
            padding: 8px 16px;
            font-size: 11px;
            cursor: pointer;
            margin-top: 16px;
            transition: color 0.2s;
            font-family: inherit;
        }

        .btn-logs:hover { color: #6b7280; }

        .logs-panel {
            display: none;
            width: 92%;
            max-height: 140px;
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            margin-top: 12px;
            overflow-y: auto;
            text-align: left;
            padding: 10px 12px;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        .logs-panel pre {
            font-family: 'Geist Mono', 'Consolas', 'Courier New', monospace;
            font-size: 9px;
            color: #a855f7;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.6;
        }

        .logs-panel::-webkit-scrollbar { width: 4px; }
        .logs-panel::-webkit-scrollbar-track { background: transparent; }
        .logs-panel::-webkit-scrollbar-thumb { background: #a855f7; border-radius: 2px; }

        /* Success state */
        .success .spinner { border-top-color: #10b981; }
        .success .progress-fill {
            width: 100% !important;
            animation: none !important;
            left: 0 !important;
            background: linear-gradient(90deg, #10b981, #34d399);
        }

        /* Error state */
        .error .spinner { border-top-color: #ef4444; }
        .error .progress-fill { background: linear-gradient(90deg, #ef4444, #f87171); }
    </style>
</head>

<body>
    <div class="bg-animated"></div>
    <div class="glow"></div>
    <div class="drag-area"></div>

    <div class="container" id="mainContainer">
        <div class="logo-container">
            <img src="../../assets/iconbis.jpg" alt="PecExpress">
        </div>

        <h1>PecExpress Desktop</h1>
        <p class="subtitle">Configuration de votre environnement</p>

        <div class="spinner-container">
            <div class="spinner"></div>
        </div>

        <p class="status" id="statusText">Initialisation...</p>

        <button id="installBtn" class="btn-install" onclick="startInstallation()">Installer PecExpress</button>

        <div class="progress-track">
            <div class="progress-fill"></div>
        </div>

        <button class="btn-logs" onclick="toggleLogs()">Afficher les logs</button>

        <div class="logs-panel" id="logsPanel">
            <pre id="logsContent"></pre>
        </div>
    </div>

    <script>
        const allLogs = [];
        const logsContent = document.getElementById('logsContent');
        const logsPanel = document.getElementById('logsPanel');
        const mainContainer = document.getElementById('mainContainer');
        let logsVisible = false;

        function addLog(msg) {
            const ts = new Date().toLocaleTimeString('fr-FR');
            allLogs.push('[' + ts + '] ' + msg);
            if (allLogs.length > 200) allLogs.shift();
            if (logsVisible) {
                logsContent.textContent = allLogs.join('\n');
                logsPanel.scrollTop = logsPanel.scrollHeight;
            }
        }

        function toggleLogs() {
            logsVisible = !logsVisible;
            logsPanel.style.display = logsVisible ? 'block' : 'none';
            if (logsVisible) {
                logsContent.textContent = allLogs.join('\n');
                logsPanel.scrollTop = logsPanel.scrollHeight;
            }
        }

        addLog('Page setup.html chargee');
        addLog('window.cabflow: ' + (window.cabflow ? 'OK' : 'MANQUANT'));

        if (window.cabflow && window.cabflow.onSetupProgress) {
            const statusElement = document.getElementById('statusText');
            const installBtn = document.getElementById('installBtn');
            const spinner = document.querySelector('.spinner-container');

            addLog('Listener onSetupProgress attache');

            window.startInstallation = async () => {
                addLog('Clic sur Installer');
                installBtn.style.display = 'none';
                spinner.style.display = 'block';
                statusElement.innerText = "Installation en cours...";
                const result = await window.cabflow.performSelfInstall();
                addLog('Resultat: ' + JSON.stringify(result));
            };

            window.cabflow.onSetupProgress((message) => {
                addLog(message);
                statusElement.innerText = message;

                if (message.includes('Cliquez sur')) {
                    spinner.style.display = 'none';
                    installBtn.style.display = 'block';
                }

                if (message.includes('russie') || message.includes('trouvee') || message.includes('terminee')) {
                    mainContainer.classList.remove('error');
                    mainContainer.classList.add('success');
                } else if (message.toLowerCase().includes('erreur')) {
                    mainContainer.classList.remove('success');
                    mainContainer.classList.add('error');
                }
            });
        } else {
            addLog('ERREUR: window.cabflow ou onSetupProgress non disponible');
        }
    </script>
</body>

</html>
