<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connecter ce poste</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;
      background:#f8fafc; color:#0f172a; padding:22px; }
    h1 { font-size:16px; margin-bottom:6px; }
    p.hint { font-size:12.5px; color:#475569; line-height:1.45; margin-bottom:16px; }
    label { display:block; font-size:12px; font-weight:600; margin-bottom:6px; color:#334155; }
    input { width:100%; padding:10px 12px; font-size:13px; border:1px solid #cbd5e1;
      border-radius:8px; outline:none; font-family:ui-monospace,Menlo,Consolas,monospace; }
    input:focus { border-color:#6366f1; box-shadow:0 0 0 3px rgba(99,102,241,.18); }
    button { margin-top:14px; width:100%; padding:11px; font-size:13.5px; font-weight:600;
      color:#fff; border:none; border-radius:8px; cursor:pointer;
      background:linear-gradient(135deg,#0ea5e9,#6366f1); }
    button:disabled { opacity:.6; cursor:default; }
    #msg { margin-top:14px; font-size:12.5px; line-height:1.4; min-height:18px; }
    #msg.ok { color:#047857; }
    #msg.err { color:#b91c1c; }
  </style>
</head>
<body>
  <h1>Connecter ce poste a votre compte</h1>
  <p class="hint">Collez la cle du connecteur, disponible dans Mon devis dentaire :
    <b>Parametres &rsaquo; Connecteur</b>. Elle relie ce poste Logos a votre cabinet
    (compte standard ou Labora).</p>
  <label for="key">Cle du connecteur</label>
  <input id="key" type="text" placeholder="collez la cle ici" autocomplete="off" spellcheck="false">
  <button id="go">Connecter</button>
  <div id="msg"></div>
  <script>
    const input = document.getElementById('key');
    const btn = document.getElementById('go');
    const msg = document.getElementById('msg');
    input.focus();
    async function connect() {
      const k = (input.value || '').trim();
      msg.className = ''; msg.textContent = '';
      if (!k) { msg.className = 'err'; msg.textContent = 'Veuillez coller la cle du connecteur.'; return; }
      btn.disabled = true; msg.textContent = 'Connexion en cours...';
      try {
        const r = await window.cabflow.pairConnect(k);
        if (r && r.ok) {
          msg.className = 'ok';
          msg.textContent = 'Poste connecte a ' + (r.cabinetName || 'votre cabinet')
            + (r.isLabora ? ' (Labora)' : '') + '. Vous pouvez fermer cette fenetre.';
        } else {
          msg.className = 'err';
          msg.textContent = 'Echec : ' + ((r && r.error) || 'cle invalide') + '.';
          btn.disabled = false;
        }
      } catch (e) {
        msg.className = 'err';
        msg.textContent = 'Erreur : ' + e.message;
        btn.disabled = false;
      }
    }
    btn.addEventListener('click', connect);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') connect(); });
  </script>
</body>
</html>
