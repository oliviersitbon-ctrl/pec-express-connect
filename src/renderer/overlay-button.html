<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon devis dentaire</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
    /* ⚠️ NE PAS remettre `-webkit-app-region: drag` ici : la fenetre overlay est
       `movable:false`, donc une zone de drag ne sert a RIEN et, sur un overlay
       frameless transparent, elle AVALE les clics et le survol des boutons
       (=> "les boutons ne reagissent plus au clic"). On garde tout no-drag. */
    html, body { height:100vh; width:100vw; background:transparent; overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif; -webkit-app-region:no-drag; }
    .wrap { position:absolute; top:4px; right:4px; display:flex; gap:6px; -webkit-app-region:no-drag; }
    .btn { display:flex; align-items:center; gap:6px; padding:4px 10px; color:#fff; font-size:11.5px;
      font-weight:600; border:none; border-radius:6px; height:24px; cursor:pointer; white-space:nowrap;
      transition:transform .12s ease, box-shadow .12s ease, opacity .3s; letter-spacing:.2px; }
    .btn.pec { background:linear-gradient(135deg,#7c3aed 0%,#a855f7 100%);
      box-shadow:0 6px 18px rgba(124,58,237,.42), inset 0 1px 0 rgba(255,255,255,.3); }
    .btn.devis { background:linear-gradient(135deg,#0ea5e9 0%,#6366f1 100%);
      box-shadow:0 6px 18px rgba(99,102,241,.42), inset 0 1px 0 rgba(255,255,255,.3); }
    .btn:hover { transform:translateY(-1px) scale(1.02); }
    .btn:active { transform:translateY(0) scale(.98); }
    .btn[hidden] { display:none; }
    .wrap.disabled .btn { background:linear-gradient(135deg,#9ca3af,#6b7280);
      box-shadow:0 2px 6px rgba(0,0,0,.15); cursor:not-allowed; opacity:.65; pointer-events:none; }
    .wrap.loading .btn { pointer-events:none; opacity:.85; }
    .dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.95);
      box-shadow:0 1px 2px rgba(0,0,0,.15); flex:none; }
    /* Etat "Envoi en cours" : la pastille (.dot) devient un petit spinner qui
       tourne, et le libelle passe a "Envoi en cours...". Meme logique visuelle
       que le bouton questionnaire. */
    .btn.sending { opacity:1 !important; }
    .btn.sending .dot { width:11px; height:11px; background:transparent;
      border:2px solid rgba(255,255,255,.45); border-top-color:#fff; box-shadow:none;
      animation:spin .6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap disabled" id="wrap">
    <button class="btn pec" id="btn-pec" title="Creer une demande de prise en charge">
      <span class="dot"></span><span class="lbl">Demande de PEC</span>
    </button>
    <button class="btn devis" id="btn-devis" title="Envoyer le devis au patient">
      <span class="dot"></span><span class="lbl">Envoi de devis</span>
    </button>
  </div>
  <script>
    const wrap = document.getElementById('wrap');
    const bPec = document.getElementById('btn-pec');
    const bDev = document.getElementById('btn-devis');
    // Modules actifs (pilotes cote site, par cabinet). Par defaut les deux.
    let mods = { pec: true, devis: true };

    function applyModules() {
      const pecOn = mods.pec !== false;
      const devOn = mods.devis !== false;
      bPec.hidden = !pecOn;
      bDev.hidden = !devOn;
      // Un seul module actif => un seul bouton (declenche directement son wf).
      // Aucun module actif => rien.
      wrap.style.display = (!pecOn && !devOn) ? 'none' : 'flex';
    }
    async function loadModules() {
      try {
        if (window.cabflow && window.cabflow.getModules) {
          const m = await window.cabflow.getModules();
          if (m && typeof m === 'object') mods = m;
        }
      } catch (e) {}
      applyModules();
    }
    loadModules();

    async function fire(intent, btn) {
      if (wrap.classList.contains('disabled') || wrap.classList.contains('loading')) return;
      wrap.classList.add('loading');
      // Feedback "Envoi en cours..." sur la pastille cliquee (spinner + libelle).
      const label = btn && btn.querySelector('.lbl');
      const original = label ? label.textContent : '';
      if (btn) btn.classList.add('sending');
      if (label) label.textContent = 'Envoi en cours…';
      const startedAt = Date.now();
      try { await window.cabflow.lancerPec(intent); }
      catch (e) { console.error('overlay error', e); }
      finally {
        // On garde le feedback visible au moins 900 ms, meme si l'ouverture est
        // quasi instantanee, pour que l'utilisateur le voie bien.
        const wait = Math.max(0, 900 - (Date.now() - startedAt));
        setTimeout(() => {
          if (btn) btn.classList.remove('sending');
          if (label) label.textContent = original;
          wrap.classList.remove('loading');
        }, wait);
      }
    }
    bPec.addEventListener('click', () => fire('pec', bPec));
    bDev.addEventListener('click', () => fire('devis', bDev));

    // ── Click-through robuste (corrige le "1er clic ignore") ──────────────────
    // La fenetre overlay est TRAVERSANTE par defaut : les icones de Logos situees
    // dessous restent cliquables. On ne capte la souris que lorsque le curseur
    // survole les pastilles.
    //   ⚠️ NE PAS revenir a `-webkit-app-region: drag` (ancien contournement) :
    //   ca avalait les clics. Ici on desactive l'ignore souris sur `mousemove`
    //   (et non `mouseenter`) : `forward:true` nous envoie les mousemove en
    //   continu meme en mode ignore, donc l'etat "cliquable" est actif BIEN
    //   AVANT le clic -> le 1er clic fonctionne, plus besoin de double-cliquer.
    function setIgnore(ignore) {
      try { window.cabflow && window.cabflow.setMouseIgnore && window.cabflow.setMouseIgnore(ignore); } catch (e) {}
    }
    let _capturing = true; // force le 1er appel ci-dessous
    function capture(on) {
      if (on === _capturing) return;
      _capturing = on;
      setIgnore(!on);
    }
    wrap.addEventListener('mousemove', () => capture(true));
    wrap.addEventListener('mouseleave', () => capture(false));
    capture(false); // etat initial : traversant

    if (window.cabflow && window.cabflow.onOverlayInfo) {
      window.cabflow.onOverlayInfo((data) => {
        // Rafraichir les modules a chaque changement (IPC local, peu couteux).
        loadModules();
        if (data && data.enabled) {
          wrap.classList.remove('disabled');
          const p = data.patient || 'ce devis';
          bPec.title = 'Demande de PEC pour ' + p;
          bDev.title = 'Envoi du devis pour ' + p;
        } else {
          wrap.classList.add('disabled');
        }
      });
    }
  </script>
</body>
</html>
